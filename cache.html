<script>
history.replaceState(null,null,'index.html');var histlength=history.length;history.go(-histlength);
function DLProgress(e){
  Percent = (Math.round(e.loaded / e.total * 100));
  setTimeout(function(){
    window.progress.innerHTML = "Instalando Offline Cache: " + Percent + "%";
  },500)
}

function DisplayCacheProgress(){
  setTimeout(function(){
    window.progress.innerHTML = "Cache Instalado Correctamente ✔ !!";

    // Cambiar estado del loader
    document.querySelector('.loader').classList.add('successful');

    // Eliminar loader2
    const loader2 = document.querySelector('.loader2');
    if(loader2){
      loader2.remove();
    }

  },1500);

  setTimeout(function(){
    window.progress.innerHTML = "Reinicie este sitio !!";
  },3500);
}

window.applicationCache.addEventListener("progress",DLProgress,false);
window.applicationCache.oncached=function(e){DisplayCacheProgress();};
window.applicationCache.onupdateready=function(e){DisplayCacheProgress();};
</script>
